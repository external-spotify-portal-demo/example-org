apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  title: Atlassian MCP Server
  name: atlassian-mcp
  description: This server provides access to Jira.
  annotations:
    mcp.spotify.com/schema-version: '2025-09-29'
    mcp.spotify.com/auth-api-id: 'core.auth.atlassian'
