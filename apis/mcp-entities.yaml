  lifecycle: production
  owner: ai-knowledge-assistance
  definition: |
    name: com.spotify/atlassian-mcp
    description: "This server provides access to Jira."
    version: "0.0.1"
    remotes:
      - type: sse
        url: "https://mcp.atlassian.com/v1/sse"
